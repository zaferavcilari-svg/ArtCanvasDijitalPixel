<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtCanvas - UKZCM Hydra</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; background: #eee; }
        
        /* CHAT PANELİ STİLLERİ */
        #chat-icon { position: fixed; bottom: 20px; left: 20px; width: 60px; height: 60px; background: #00BFFF; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 1000; }
        #notif-dot { position: absolute; top: 0; right: 0; width: 15px; height: 15px; background: red; border-radius: 50%; display: none; border: 2px solid white; }
        #chat-window { position: fixed; bottom: 90px; left: 20px; width: 300px; height: 400px; background: white; border-radius: 10px; display: none; flex-direction: column; box-shadow: 0 5px 20px rgba(0,0,0,0.2); z-index: 1000; overflow: hidden; }
        #chat-header { background: #00BFFF; color: white; padding: 10px; font-weight: bold; text-align: center; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        #chat-input-area { display: flex; padding: 10px; border-top: 1px solid #ddd; }
        #chat-input { flex: 1; border: 1px solid #ccc; border-radius: 5px; padding: 5px; outline: none; }
        
        .msg { padding: 8px; border-radius: 8px; max-width: 80%; font-size: 14px; }
        .msg-me { align-self: flex-end; background: #dcf8c6; }
        .msg-other { align-self: flex-start; background: #f1f0f0; }

        /* PROFİL PANELİ */
        #profile-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .profile-card { background: white; padding: 25px; border-radius: 15px; text-align: center; border: 4px solid #00BFFF; }
    </style>
</head>
<body>

<div id="canvas-container">
    <h3 style="text-align: center; margin-top: 40vh;">Çizim Alanı (Beta)</h3>
</div>

<div id="chat-icon" onclick="toggleChat()">
    <span style="color: white; font-size: 30px;">💬</span>
    <div id="notif-dot"></div>
</div>

<div id="chat-window">
    <div id="chat-header">UKZCM Hydra Chat</div>
    <div id="chat-messages"></div>
    <div id="chat-input-area">
        <input type="text" id="chat-input" placeholder="Mesaj yaz..." onkeypress="handleKey(event)">
        <button onclick="sendMsg()" style="margin-left:5px; background:#00BFFF; color:white; border:none; border-radius:5px; padding:5px 10px;">Gelen</button>
    </div>
</div>

<div id="profile-overlay">
    <div class="profile-card">
        <h2 style="color: #00BFFF;">Hydra ArtCanvas</h2>
        <p>Kullanıcı Adını Belirle:</p>
        <input type="text" id="username-input" style="padding:10px; width:80%;">
        <br><br>
        <button onclick="saveProfile()" style="padding:10px 20px; background:#00BFFF; color:white; border:none; border-radius:5px; font-weight:bold;">Sisteme Gir</button>
    </div>
</div>

<script>
    // 1. FIREBASE AYARLARI (BURAYI DOLDUR!)
    const firebaseConfig = {
        apiKey: "BURAYA_API_ANAHTARIN",
        authDomain: "BURAYA_DOMAIN",
        databaseURL: "BURAYA_DATABASE_URL",
        projectId: "BURAYA_PROJECT_ID",
        storageBucket: "BURAYA_BUCKET",
        messagingSenderId: "BURAYA_SENDER_ID",
        appId: "BURAYA_APP_ID"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. PROFİL VE ÇEREZ MANTIĞI
    let currentUser = "";
    function setCookie(name, value) {
        const d = new Date();
        d.setTime(d.getTime() + (30*24*60*60*1000));
        document.cookie = name + "=" + value + ";expires="+ d.toUTCString() + ";path=/";
    }
    function getCookie(name) {
        let n = name + "=";
        let ca = document.cookie.split(';');
        for(let i = 0; i < ca.length; i++) {
            let c = ca[i].trim();
            if (c.indexOf(n) == 0) return c.substring(n.length, c.length);
        }
        return "";
    }

    window.onload = () => {
        let savedUser = getCookie("username");
        if(savedUser) {
            currentUser = savedUser;
            document.getElementById('profile-overlay').style.display = 'none';
        }
    };

    function saveProfile() {
        let val = document.getElementById('username-input').value.trim();
        if(val.length >= 3) {
            setCookie("username", val);
            currentUser = val;
            document.getElementById('profile-overlay').style.display = 'none';
        } else { alert("İsim en az 3 karakter olmalı!"); }
    }

    // 3. CHAT MANTIĞI
    let isChatOpen = false;
    function toggleChat() {
        isChatOpen = !isChatOpen;
        document.getElementById('chat-window').style.display = isChatOpen ? 'flex' : 'none';
        if(isChatOpen) document.getElementById('notif-dot').style.display = 'none';
    }

    function handleKey(e) { if(e.key === 'Enter') sendMsg(); }

    function sendMsg() {
        let input = document.getElementById('chat-input');
        if(input.value.trim() === "") return;
        
        db.ref('chat').push({
            name: currentUser,
            msg: input.value,
            time: Date.now()
        });
        input.value = "";
    }

    // Mesajları Dinle (Son 15 Mesaj)
    db.ref('chat').limitToLast(15).on('child_added', (snap) => {
        let data = snap.val();
        let msgDiv = document.createElement('div');
        msgDiv.className = 'msg ' + (data.name === currentUser ? 'msg-me' : 'msg-other');
        msgDiv.innerHTML = `<b>${data.name}:</b> ${data.msg}`;
        let container = document.getElementById('chat-messages');
        container.appendChild(msgDiv);
        container.scrollTop = container.scrollHeight;

        if(!isChatOpen && data.name !== currentUser) {
            document.getElementById('notif-dot').style.display = 'block';
        }
    });
</script>
</body>
</html>
