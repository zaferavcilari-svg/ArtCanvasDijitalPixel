<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ArtCanvas - Ana Katman</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a1a1a;
        }

        /* Void_1 katmanı: Ana dizinde olduğu kesinleşti */
        #void-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('void_1.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -1;
            /* Görselin yüklenmesini zorlamak için */
            display: block; 
        }
    </style>
</head>
<body>

    <div id="void-layer"></div>

    <script>
        // Hata ayıklama için: Görselin yüklenip yüklenmediğini kontrol et
        const img = new Image();
        img.src = 'void_1.png';
        img.onload = () => console.log("Görsel başarıyla yüklendi.");
        img.onerror = () => console.error("HATA: void_1.png dosyası bulunamadı! Lütfen dosya adını ve konumunu kontrol et.");
    </script>
</body>
</html>
