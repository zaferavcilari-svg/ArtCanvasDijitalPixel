<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ArtCanvas - Ana Sürüm</title>
    <style>
        /* Genel Ekran Ayarları */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            image-rendering: pixelated; /* Çizimlerin pikselli ve net durması için */
        }

        body {
            background-color: #121212; /* Kanvas alanı için arka plan */
            overflow: hidden;
            font-family: sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
        }

        /* SOL PANEL: Arka planına pannel.png oturacak */
        #main-side-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 75px;
            height: 100vh;
            background-image: url('pannel.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            border-right: 4px solid #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            gap: 20px;
            z-index: 2000;
        }

        /* BUTON HITBOX ALANLARI */
        .hitbox-btn {
            width: 55px;
            height: 55px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s;
        }

        /* Basılma efekti */
        .hitbox-btn:active {
            transform: scale(0.92);
        }

        .hitbox-btn img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* ALT PALET: Arka planına pallet.png oturacak */
        #main-bottom-palette {
            position: fixed;
            bottom: 0;
            left: 75px;
            width: calc(100vw - 75px);
            height: 105px;
            background-image: url('pallet.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            border-top: 4px solid #000000;
            z-index: 2000;
        }

        /* ORTA ALAN */
        #center-view {
            position: absolute;
            top: 0;
            left: 75px;
            width: calc(100vw - 75px);
            height: calc(100vh - 105px);
        }
    </style>
</head>
<body>

    <!-- SOL PANEL VE BUTON GÖRSELLERİ -->
    <div id="main-side-panel">
        <!-- Home / Event Butonu -->
        <div class="hitbox-btn" id="hitbox-home">
            <img src="home.png" alt="Home">
        </div>
        <!-- Profil Butonu -->
        <div class="hitbox-btn" id="hitbox-profile">
            <img src="profile.png" alt="Profil">
        </div>
        <!-- Chat Butonu -->
        <div class="hitbox-btn" id="hitbox-chat">
            <img src="chat.png" alt="Chat">
        </div>
    </div>

    <!-- KANVASIN GELECEĞİ BOŞ ALAN -->
    <div id="center-view"></div>

    <!-- ALT PANEL (Görseli kaplayacak boş alan) -->
    <div id="main-bottom-palette"></div>

    <script>
        console.log("ArtCanvas Ana Sürüm: Asset tabanlı arayüz hazır lider!");

        // Hitbox tıklama testleri
        document.getElementById('hitbox-home').addEventListener('click', () => {
            console.log("Home butonuna tıklandı.");
        });
        document.getElementById('hitbox-profile').addEventListener('click', () => {
            console.log("Profil butonuna tıklandı.");
        });
        document.getElementById('hitbox-chat').addEventListener('click', () => {
            console.log("Chat butonuna tıklandı.");
        });
    </script>
</body>
</html>
