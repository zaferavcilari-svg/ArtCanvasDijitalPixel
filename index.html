<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ArtCanvas - Beta 4.01 Kişisel Güncelleme</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <style>
        body { margin: 0; background: #0000FF; overflow: hidden; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #header-bar { position: fixed; top: 0; width: 100%; background: #00BFFF; color: white; padding: 10px; text-align: center; font-weight: bold; z-index: 3000; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        #px-status { position: fixed; top: 50px; left: 10px; background: rgba(0,0,0,0.8); color: white; padding: 8px; border-radius: 8px; font-size: 11px; z-index: 4000; border: 1px solid #00BFFF; }
        #canvas-wrap { position: relative; width: 320px; height: 320px; background: white; border: 4px solid #00BFFF; z-index: 5; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        canvas { width: 100%; height: 100%; image-rendering: pixelated; transform-origin: center; }
        #ui-palette { position: fixed; bottom: 0; width: 100%; height: 90px; background: #f0f0f0; border-top: 5px solid #00BFFF; display: flex; flex-wrap: wrap; justify-content: center; padding: 5px; box-sizing: border-box; z-index: 1500; }
        .color { width: 28px; height: 28px; border-radius: 5px; margin: 3px; border: 1px solid #ccc; cursor: pointer; }
        .color.active { border: 3px solid #00BFFF; transform: scale(1.1); }
        #chat-icon { position: fixed; bottom: 100px; left: 15px; width: 50px; height: 50px; background: #00BFFF; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 2000; border: 3px solid white; font-size: 22px; cursor: pointer; }
        #reg-btn { position: fixed; bottom: 160px; left: 15px; width: 70px; height: 35px; background: white; border: 2px solid #00BFFF; border-radius: 8px; z-index: 2000; font-size: 11px; font-weight: bold; color: #00BFFF; cursor: pointer; }
        #chat-window { position: fixed; bottom: 210px; left: 15px; width: 280px; height: 350px; background: white; border-radius: 15px; display: none; flex-direction: column; z-index: 2000; border: 3px solid #00BFFF; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 10px; font-size: 13px; }
        #chat-input-area { display: flex; padding: 8px; border-top: 1px solid #eee; }
        #chat-input { flex: 1; border: 1px solid #ddd; border-radius: 5px; padding: 8px; outline: none; }
        #profile-overlay, #logo-panel { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 5000; display: none; align-items: center; justify-content: center; }
        .profile-card { background: white; padding: 20px; border-radius: 20px; text-align: center; border: 4px solid #00BFFF; width: 270px; }
        .logo-item { width: 55px; height: 55px; border-radius: 50%; margin: 5px; cursor: pointer; object-fit: cover; border: 2px solid #eee; }
        .logo-item:hover { border-color: #00BFFF; }
        /* AUTH TASARIMI */
        .auth-input { width: 90%; padding: 8px; margin-bottom: 8px; border: 1px solid #ddd; border-radius: 5px; }
        .auth-btn { width: 48%; padding: 10px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; color: white; }
        .guest-status { font-size: 11px; color: #777; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="px-status">Pixel: <span id="px-count">32</span>/32<br>Hız: +6px/4s</div>
    <audio id="bgMusic" loop><source src="rplaceoldmusic.mp3" type="audio/mpeg"></audio>

    <div id="header-bar">UKZCM Hydra - ArtCanvas (BETA 4.01)</div>
    <div id="canvas-wrap"><canvas id="artCanvas"></canvas></div>

    <div id="ui-palette"></div>
    <button id="reg-btn" onclick="openReg()">PROFİL</button>
    <div id="chat-icon" onclick="toggleChat()">💬</div>
    
    <div id="chat-window">
        <div id="chat-messages"></div>
        <div id="chat-input-area">
            <input type="text" id="chat-input" placeholder="Yaz..." onkeypress="if(event.key==='Enter')sendMsg()">
            <button onclick="sendMsg()" style="background:#00BFFF; color:white; border:none; border-radius:5px; padding:8px; margin-left:5px;">></button>
        </div>
    </div>

    <div id="profile-overlay"><div class="profile-card">
        <h3 id="profile-title" style="color:#00BFFF; margin-top:0;">Beta 4.01 Profil</h3>
        <p id="auth-status" class="guest-status">Durum: Anonim (Yedeklenmedi)</p>
        
        <div style="position:relative; margin-bottom:15px; cursor:pointer;" onclick="openLogoPanel()">
            <img id="profile-pfp" src="guest.jpg" style="width:80px; height:80px; border-radius:50%; border:3px solid #00BFFF; object-fit:cover;">
            <div style="position:absolute; bottom:0; right:30%; background:#00BFFF; color:white; border-radius:50%; width:22px; height:22px; font-size:12px; line-height:22px;">📷</div>
        </div>
        
        <input type="text" id="username-input" placeholder="İsim" class="auth-input">
        <input type="number" id="age-input" placeholder="Yaş" class="auth-input" style="width:40%; display:inline-block;">
        <input type="text" id="country-input" placeholder="Ülke" class="auth-input" style="width:40%; display:inline-block;">
        
        <div id="main-profile-btns" style="margin-top:15px;">
            <button onclick="saveLocalProfile()" style="width:100%; padding:12px; background:#00BFFF; color:white; font-weight:bold; border:none; border-radius:8px; margin-bottom:10px;">PROFILI KAYDET (Yerel)</button>
            <div style="display:flex; justify-content:space-between;">
                <button onclick="showRegister()" style="background:#333;" class="auth-btn">KAYDOL (Yedekle)</button>
                <button onclick="showLogin()" style="background:#555;" class="auth-btn">GİRİŞ YAP (Yükle)</button>
            </div>
        </div>

        <div id="auth-fields" style="display:none; margin-top:15px; border-top:1px solid #eee; padding-top:10px;">
            <input type="email" id="auth-email" placeholder="E-posta" class="auth-input">
            <input type="password" id="auth-pass" placeholder="Şifre" class="auth-input">
            <div style="display:flex; justify-content:space-between;">
                <button id="auth-action-btn" class="auth-btn" style="background:#00BFFF;"></button>
                <button onclick="hideAuth()" class="auth-btn" style="background:#ccc; color:#333;">İptal</button>
            </div>
            <p onclick="requestPassReset()" style="font-size:10px; color:#999; text-decoration:underline; cursor:pointer; margin-top:10px;">Şifremi Unuttum?</p>
        </div>
        <button onclick="signOutUser()" id="signout-btn" style="display:none; width:100%; background:#ff4444; color:white; margin-top:10px; border:none; padding:8px; border-radius:5px;">ÇIKIŞ YAP</button>
        <button onclick="closeReg()" style="margin-top:15px; background:none; border:none; color:#666; cursor:pointer;">Kapat</button>
    </div></div>

    <div id="logo-panel"><div class="profile-card" style="width:280px;">
        <h3>Logo Seç</h3>
        <div id="logo-list" style="display:grid; grid-template-columns:repeat(3, 1fr); gap:10px; margin-bottom:15px;"></div>
        <button onclick="closeLogoPanel()" style="width:100%; padding:10px; background:#ccc; border:none; border-radius:5px;">Geri</button>
    </div></div>

    <script>
        // 1. FIREBASE BAĞLANTISI VE CONFIG
        const firebaseConfig = { databaseURL: "https://ukzcm-artcanvas-default-rtdb.firebaseio.com/" }; // Database URL aynı
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth(); // Auth aktifleştirildi

        // 2. KANVAS VE PİXEL SAVAŞI
        const cvs = document.getElementById('artCanvas'), ctx = cvs.getContext('2d'), sz = 128;
        let clr = '#000000', sc = 1, px = 0, py = 0; cvs.width = sz; cvs.height = sz;
        let myPixels = parseInt(localStorage.getItem('my_pixels')) || 32, timeLeft = 4;
        function updatePixelUI() { document.getElementById('px-count').innerText = myPixels; localStorage.setItem('my_pixels', myPixels); }
        setInterval(() => { timeLeft--; if (timeLeft <= 0) { myPixels = Math.min(32, myPixels + 6); timeLeft = 4; } updatePixelUI(); }, 1000);
        const colors = ['#000000', '#FFFFFF', '#FF0000', '#FFA500', '#FFFF00', '#008000', '#0000FF', '#800080', '#FFDBAC', '#00FFFF'];
        const palette = document.getElementById('ui-palette');
        colors.forEach((c, i) => { const div = document.createElement('div'); div.className = 'color'+(i===0?' active':''); div.style.backgroundColor = c; div.onclick = () => { document.querySelectorAll('.color').forEach(el=>el.classList.remove('active')); div.classList.add('active'); clr = c; }; palette.appendChild(div); });
        window.z = (ds) => { sc = Math.max(0.2, sc+ds); cvs.style.transform = `scale(${sc})`; };
        cvs.addEventListener('click', (e) => {
            if (myPixels <= 0) return;
            const rect = cvs.getBoundingClientRect();
            const x = Math.floor((e.clientX - rect.left) / (rect.width / sz)), y = Math.floor((e.clientY - rect.top) / (rect.height / sz));
            if (x>=0 && x<sz && y>=0 && y<sz) { db.ref('pixels').push({ x, y, color: clr }); myPixels--; updatePixelUI(); }
        });
        db.ref('pixels').on('child_added', (s) => { const p = s.val(); ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, 1, 1); });

        // 3. PROFİL & LOGO SİSTEMİ (LİDERİN RESİMLERİ)
        // guest.jpg varsayılan pp olarak eklendi
        const availLogos = [
            { name: 'Guest', url: 'guest.jpg' }, 
            { name: 'Yıldırım', url: 'yıldırımlogo.jpg' },
            { name: 'Berat', url: 'beratlogo.jpg' },
            { name: 'Alpay', url: 'alpaylogo.jpg' },
            { name: 'Alan', url: 'alanlogo.jpg' },
            { name: 'Antegria', url: 'antegrialogo.jpg' }
        ];
        let selectedLogo = localStorage.getItem('selected_logo') || 'guest.jpg';
        document.getElementById('profile-pfp').src = selectedLogo;

        function openReg() { document.getElementById('profile-overlay').style.display = 'flex'; loadCurrentProfile(); }
        function closeReg() { document.getElementById('profile-overlay').style.display = 'none'; hideAuth(); }
        function openLogoPanel() {
            const list = document.getElementById('logo-list'); list.innerHTML = '';
            availLogos.forEach(l => { const img = document.createElement('img'); img.src = l.url; img.className = 'logo-item'; img.onclick = () => { selectedLogo = l.url; document.getElementById('profile-pfp').src = l.url; localStorage.setItem('selected_logo', selectedLogo); closeLogoPanel(); }; list.appendChild(img); });
            document.getElementById('logo-panel').style.display = 'flex';
        }
        function closeLogoPanel() { document.getElementById('logo-panel').style.display = 'none'; }

        // 4. LİDERİN İSTEDİĞİ 3 BUTONLU PROFİL YÖNETİMİ
        let isEditing = false; // Auth panelinde kayıt mı giriş mi yapılıyor?

        // 4A. BUTON 1: PROFILI KAYDET (Sadece Yerel/Local)
        function saveLocalProfile() {
            const name = document.getElementById('username-input').value, age = document.getElementById('age-input').value, country = document.getElementById('country-input').value;
            if(name && age && country) {
                const profile = { name, age, country, pfp: selectedLogo };
                localStorage.setItem('user_profile', JSON.stringify(profile));
                // Eğer kullanıcı giriş yapmışsa, buluta da senkronize et (Faz 2)
                if(auth.currentUser) { db.ref('users/'+auth.currentUser.uid).update(profile); }
                alert("Profil yerel olarak kaydedildi lider! (Yedeklenmedi)");
                closeReg();
            } else { alert("Tüm alanları doldur!"); }
        }

        // Auth Panelini Yönetme
        function showAuth(type) {
            isEditing = (type === 'register');
            document.getElementById('main-profile-btns').style.display = 'none';
            document.getElementById('auth-fields').style.display = 'block';
            document.getElementById('profile-title').innerText = isEditing ? "Kayıt Ol (Yedekle)" : "Giriş Yap (Kurtar)";
            document.getElementById('auth-action-btn').innerText = isEditing ? "KAYDOL VE YEDEKLE" : "GİRİŞ YAP VE YÜKLE";
            document.getElementById('auth-action-btn').onclick = isEditing ? doRegister : doLogin;
        }
        function hideAuth() {
            document.getElementById('main-profile-btns').style.display = 'block';
            document.getElementById('auth-fields').style.display = 'none';
            document.getElementById('profile-title').innerText = "Beta 4.01 Profil";
            document.getElementById('auth-email').value = ''; document.getElementById('auth-pass').value = '';
        }

        // 4B. BUTON 2: KAYDOL (Mail/Şifre Oluştur ve Yedekle)
        function showRegister() { showAuth('register'); }
        function doRegister() {
            const email = document.getElementById('auth-email').value, pass = document.getElementById('auth-pass').value;
            if(email && pass) {
                // Firebase Auth Kayıt
                auth.createUserWithEmailAndPassword(email, pass)
                    .then((userCredential) => {
                        // Kayıt başarılı, yerel profili buluta yedekle
                        const profile = JSON.parse(localStorage.getItem('user_profile')) || {name: "Anonim", age: "?", country: "?", pfp: selectedLogo};
                        db.ref('users/' + userCredential.user.uid).set(profile);
                        alert("Başarıyla kaydoldun! Profilin buluta yedeklendi.");
                        hideAuth(); closeReg();
                    })
                    .catch((error) => { alert("Hata: " + error.message); });
            } else { alert("Mail ve şifre gir!"); }
        }

        // 4C. BUTON 3: GİRİŞ YAP (E-posta ve Şifre ile Kurtar)
        function showLogin() { showAuth('login'); }
        function doLogin() {
            const email = document.getElementById('auth-email').value, pass = document.getElementById('auth-pass').value;
            if(email && pass) {
                // Firebase Auth Giriş
                auth.signInWithEmailAndPassword(email, pass)
                    .then((userCredential) => {
                        // Giriş başarılı, buluttaki profili çek ve yereli güncelle
                        db.ref('users/' + userCredential.user.uid).once('value').then((snap) => {
                            const cloudProf = snap.val();
                            if(cloudProf) {
                                localStorage.setItem('user_profile', JSON.stringify(cloudProf));
                                selectedLogo = cloudProf.pfp; localStorage.setItem('selected_logo', selectedLogo);
                                document.getElementById('profile-pfp').src = selectedLogo;
                            }
                        });
                        alert("Giriş başarılı! Profilin yüklendi lider.");
                        hideAuth(); closeReg();
                    })
                    .catch((error) => { alert("Giriş Hata: " + error.message); });
            } else { alert("Mail ve şifre gir!"); }
        }

        // ÇIKIŞ YAP VE ŞİFRE SIFIRLAMA
        function signOutUser() { auth.signOut(); alert("Çıkış yapıldı."); closeReg(); }
        function requestPassReset() { const email = document.getElementById('auth-email').value || prompt("E-posta gir:"); if(email) { auth.sendPasswordResetEmail(email).then(() => { alert("Şifre sıfırlama maili gönderildi lider!"); }); } }

        // Durumu Takip Et (Anonim mi, Giriş mi yapmış?)
        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('auth-status').innerText = `Durum: Giriş Yapıldı (${user.email})`;
                document.getElementById('signout-btn').style.display = 'block';
                // Giriş yapmışsa chate tag eklemek için yerel profili güncelle
            } else {
                document.getElementById('auth-status').innerText = "Durum: Anonim (Yedeklenmedi)";
                document.getElementById('signout-btn').style.display = 'none';
            }
        });

        // Mevcut yerel bilgileri panele doldur
        function loadCurrentProfile() {
            const prof = JSON.parse(localStorage.getItem('user_profile')) || {name: '', age: '', country: '', pfp: 'guest.jpg'};
            document.getElementById('username-input').value = prof.name;
            document.getElementById('age-input').value = prof.age;
            document.getElementById('country-input').value = prof.country;
            document.getElementById('profile-pfp').src = prof.pfp;
        }

        // 5. CHAT SİSTEMİ (TAG VE PFP İLE)
        function toggleChat() { let w = document.getElementById('chat-window'); w.style.display = (w.style.display==='flex'?'none':'flex'); }
        function sendMsg() {
            let i = document.getElementById('chat-input');
            let prof = JSON.parse(localStorage.getItem('user_profile')) || {name: "Anonim", age: "?", country: "?", pfp: "guest.jpg"};
            if(i.value) { db.ref('messages').push({ user: prof.name, text: i.value, age: prof.age, country: prof.country, pfp: prof.pfp }); i.value = ""; }
        }
        db.ref('messages').limitToLast(15).on('child_added', (s) => {
            const m = s.val(), msgBox = document.getElementById('chat-messages');
            // Eğer giriş yapmışsa, lider tag'i vb. ekleyebiliriz (Faz 2)
            msgBox.innerHTML += `<div style="display:flex; align-items:center; margin-bottom:6px;"><img src="${m.pfp||'guest.jpg'}" style="width:28px; height:28px; border-radius:50%; margin-right:6px; border:1px solid #00BFFF;"><div style="flex:1;"><b style="color:#00BFFF; font-size:11px;">[${m.country||'?'}/${m.user}/${m.age||'?'}]</b><br><span>${m.text}</span></div></div>`;
            msgBox.scrollTop = msgBox.scrollHeight;
        });

        // 6. MÜZİK VE BAŞLANGIÇ
        const music = document.getElementById('bgMusic');
        function startAudio() { music.play().catch(()=>{}); window.removeEventListener('pointerdown', startAudio); }
        window.addEventListener('pointerdown', startAudio);
        window.onload = () => { up(); updatePixelUI(); };
        function up() { cvs.style.transform = `scale(${sc})`; }
    </script>
</body>
</html>
