<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ArtCanvas - Dijital</title>
    <style>
        body { margin: 0; background: #0000FF; overflow: hidden; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #canvas-wrap { position: relative; width: 320px; height: 320px; background: white; border: 4px solid #00BFFF; overflow: hidden; }
        canvas { width: 100%; height: 100%; image-rendering: pixelated; transform-origin: center; }
        #ui-controls { position: fixed; bottom: 100px; right: 15px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; z-index: 2000; }
        .btn { width: 50px; height: 50px; background: white; border: 3px solid #00BFFF; border-radius: 10px; font-size: 20px; cursor: pointer; }
        #ui-palette { position: fixed; bottom: 0; width: 100%; height: 90px; background: #f0f0f0; border-top: 5px solid #00BFFF; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 6px; padding: 5px; box-sizing: border-box; z-index: 1500; }
        .color { width: 32px; height: 32px; border-radius: 4px; border: 1px solid #ccc; cursor: pointer; }
        .color.active { border: 3px solid #00BFFF; transform: scale(1.1); }

        /* Üst Bilgi */
        #header-bar { position: fixed; top: 0; width: 100%; background: #00BFFF; color: white; padding: 10px; text-align: center; font-weight: bold; z-index: 3000; }
        
        /* Chat Yapısı */
        #chat-icon { position: fixed; bottom: 100px; left: 15px; width: 55px; height: 55px; background: #00BFFF; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 2000; border: 3px solid white; font-size: 25px; }
        #reg-btn { position: fixed; bottom: 165px; left: 15px; width: 55px; height: 30px; background: white; border: 2px solid #00BFFF; border-radius: 5px; cursor: pointer; z-index: 2000; font-size: 10px; font-weight: bold; color: #00BFFF; }
        
        #chat-window { position: fixed; bottom: 205px; left: 15px; width: 280px; height: 350px; background: white; border-radius: 15px; display: none; flex-direction: column; z-index: 2000; border: 3px solid #00BFFF; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        #chat-messages { flex: 1; overflow-y: auto; padding: 10px; font-size: 14px; }
        #chat-input-area { display: flex; padding: 10px; border-top: 1px solid #eee; }
        #chat-input { flex: 1; border: 1px solid #ddd; border-radius: 5px; padding: 5px; outline: none; }

        /* Kayıt Paneli */
        #profile-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 5000; display: none; align-items: center; justify-content: center; }
        .profile-card { background: white; padding: 25px; border-radius: 15px; text-align: center; border: 4px solid #00BFFF; width: 250px; }
    </style>
</head>
<body>

    <div id="header-bar">Dijital - ArtCanvas (Alpha)</div>

    <div id="canvas-wrap">
        <canvas id="artCanvas"></canvas>
    </div>

    <div id="ui-controls">
        <button class="btn" onclick="m(0,-40)">⬆️</button>
        <button class="btn" onclick="m(0,40)">⬇️</button>
        <button class="btn" onclick="m(-40,0)">⬅️</button>
        <button class="btn" onclick="m(40,0)">➡️</button>
        <button class="btn" onclick="z(0.3)">➕</button>
        <button class="btn" onclick="z(-0.3)">➖</button>
    </div>

    <div id="ui-palette"></div>

    <button id="reg-btn" onclick="openReg()">KAYDOL</button>
    <div id="chat-icon" onclick="toggleChat()">💬</div>
    
    <div id="chat-window">
        <div style="background:#00BFFF; color:white; padding:8px; text-align:center; font-weight:bold; font-size:12px;">UKZCM Hydra Chat</div>
        <div id="chat-messages"></div>
        <div id="chat-input-area">
            <input type="text" id="chat-input" placeholder="Mesaj yaz..." onkeypress="handleKey(event)">
            <button onclick="sendMsg()" style="background:#00BFFF; color:white; border:none; border-radius:5px; margin-left:5px; cursor:pointer; padding:5px 10px;">></button>
        </div>
    </div>

    <div id="profile-overlay" id="regPanel">
        <div class="profile-card">
            <h3 style="color:#00BFFF; margin-top:0;">Dijital Kayıt</h3>
            <input type="text" id="username-input" placeholder="İsim giriniz..." style="width:90%; padding:10px; border:1px solid #ddd; border-radius:5px;">
            <br><br>
            <button onclick="saveName()" style="width:100%; padding:10px; background:#00BFFF; color:white; border:none; border-radius:5px; font-weight:bold;">KAYDET</button>
            <button onclick="closeReg()" style="margin-top:10px; background:none; border:none; color:gray; font-size:12px; cursor:pointer;">Kapat</button>
        </div>
    </div>

    <script>
        // --- Çizim ve UI Mantığı ---
        const cvs = document.getElementById('artCanvas');
        const ctx = cvs.getContext('2d');
        let clr = '#000000', sc = 1, px = 0, py = 0, sz = 128;
        cvs.width = sz; cvs.height = sz;

        const colors = ['#000000', '#FFFFFF', '#808080', '#FF0000', '#FFA500', '#FFFF00', '#008000', '#0000FF', '#800080', '#FFC0CB', '#FFDBAC', '#00FFFF'];
        const palette = document.getElementById('ui-palette');

        colors.forEach((c, i) => {
            const div = document.createElement('div');
            div.className = 'color' + (i === 0 ? ' active' : '');
            div.style.backgroundColor = c;
            div.onclick = () => {
                document.querySelectorAll('.color').forEach(el => el.classList.remove('active'));
                div.classList.add('active');
                clr = c;
            };
            palette.appendChild(div);
        });

        window.m = (dx, dy) => { px += dx; py += dy; up(); };
        window.z = (ds) => { sc = Math.max(0.2, sc + ds); up(); };
        function up() { cvs.style.transform = `translate(${px}px, ${py}px) scale(${sc})`; }

        cvs.addEventListener('click', (e) => {
            const r = cvs.getBoundingClientRect();
            const x = Math.floor((e.clientX - r.left) / (r.width / sz));
            const y = Math.floor((e.clientY - r.top) / (r.height / sz));
            ctx.fillStyle = clr;
            ctx.fillRect(x, y, 1, 1);
        });

        // --- İsim ve Chat Mantığı ---
        function getCookie(n) {
            let b = document.cookie.match('(^|;)\\s*' + n + '\\s*=\\s*([^;]+)');
            return b ? b.pop() : "";
        }

        // Eğer isim yoksa otomatik "Kullanıcı + Rastgele Sayı" ata
        let myName = getCookie("user_name");
        if (!myName) {
            myName = "Kullanıcı" + Math.floor(Math.random() * 1000);
        }

        function openReg() { document.getElementById('profile-overlay').style.display = 'flex'; }
        function closeReg() { document.getElementById('profile-overlay').style.display = 'none'; }

        function saveName() {
            let input = document.getElementById('username-input').value.trim();
            if (input.length >= 2) {
                document.cookie = "user_name=" + input + "; max-age=2592000; path=/";
                myName = input;
                closeReg();
                alert("Hoş geldin " + myName);
            }
        }

        function toggleChat() {
            let w = document.getElementById('chat-window');
            w.style.display = (w.style.display === 'flex') ? 'none' : 'flex';
        }

        function handleKey(e) { if(e.key === 'Enter') sendMsg(); }

        function sendMsg() {
            let inp = document.getElementById('chat-input');
            if(!inp.value.trim()) return;
            
            // Burası Termux ile senkronize edilecek kısım
            console.log(myName + ": " + inp.value);
            
            // Test için ekrana basalım
            let msgBox = document.getElementById('chat-messages');
            msgBox.innerHTML += `<div><b>${myName}:</b> ${inp.value}</div>`;
            msgBox.scrollTop = msgBox.scrollHeight;
            inp.value = "";
        }

        window.onload = up;
    </script>
</body>
</html>
