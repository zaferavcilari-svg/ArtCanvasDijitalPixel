<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtCanvas</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a1a1a;
        }

        #void-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            /* Dosyalar aynı dizinde olduğu için sadece isim yeterli */
            background-image: url('void_1.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -1;
        }
    </style>
</head>
<body>

    <div id="void-layer"></div>

    <script>
        console.log("Dosya kontrolü başlatılıyor...");
        const img = new Image();
        img.src = 'void_1.png';
        img.onload = () => console.log("Başarılı: Görsel yüklendi.");
        img.onerror = () => console.error("HATA: Görsel yüklenemedi! Dosya adında boşluk veya büyük/küçük harf hatası olabilir.");
    </script>
</body>
</html>
