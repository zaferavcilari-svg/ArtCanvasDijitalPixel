<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Art Canvas Alpha ac1</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        /* SENİN ESKİ STİLLERİN */
        body { margin: 0; background: #0000FF; overflow: hidden; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #canvas-wrap { position: relative; width: 320px; height: 320px; background: white; border: 4px solid #00BFFF; overflow: hidden; }
        canvas { width: 100%; height: 100%; image-rendering: pixelated; transform-origin: center; }
        #ui-controls { position: fixed; bottom: 100px; right: 15px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; z-index: 2000; }
        .btn { width: 50px; height: 50px; background: white; border: 3px solid #00BFFF; border-radius: 10px; font-size: 20px; cursor: pointer; }
        #ui-palette { position: fixed; bottom: 0; width: 100%; height: 90px; background: #f0f0f0; border-top: 5px solid #00BFFF; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 6px; padding: 5px; box-sizing: border-box; z-index: 1500; }
        .color { width: 32px; height: 32px; border-radius: 4px; border: 1px solid #ccc; cursor: pointer; }
        .color.active { border: 3px solid #00BFFF; transform: scale(1.1); }

        /* YENİ EKLEMLER: CHAT VE PROFİL */
        #chat-icon { position: fixed; bottom: 100px; left: 15px; width: 55px; height: 55px; background: #00BFFF; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 2000; border: 3px solid white; }
        #notif-dot { position: absolute; top: 0; right: 0; width: 15px; height: 15px; background: red; border-radius: 50%; display: none; border: 2px solid white; }
        #chat-window { position: fixed; bottom: 165px; left: 15px; width: 280px; height: 350px; background: white; border-radius: 15px; display: none; flex-direction: column; box-shadow: 0 5px 20px rgba(0,0,0,0.5); z-index: 2000; border: 3px solid #00BFFF; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 10px; font-size: 14px; }
        #chat-input-area { display: flex; padding: 8px; border-top: 1px solid #ddd; }
        #chat-input { flex: 1; border: 1px solid #ccc; border-radius: 5px; padding: 5px; }

        #profile-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .profile-card { background: white; padding: 30px; border-radius: 20px; text-align: center; border: 5px solid #00BFFF; width: 80%; max-width: 300px; }
    </style>
</head>
<body>

    <div id="canvas-wrap">
        <canvas id="artCanvas"></canvas>
    </div>

    <div id="ui-controls">
        <button class="btn" onclick="m(0,-40)">⬆️</button>
        <button class="btn" onclick="m(0,40)">⬇️</button>
        <button class="btn" onclick="m(-40,0)">⬅️</button>
        <button class="btn" onclick="m(40,0)">➡️</button>
        <button class="btn" onclick="z(0.3)">➕</button>
        <button class="btn" onclick="z(-0.3)">➖</button>
    </div>

    <div id="ui-palette"></div>

    <div id="chat-icon" onclick="toggleChat()">
        <span style="font-size: 25px;">💬</span>
        <div id="notif-dot"></div>
    </div>
    <div id="chat-window">
        <div style="background:#00BFFF; color:white; padding:8px; text-align:center; font-weight:bold;">Hydra Chat</div>
        <div id="chat-messages"></div>
        <div id="chat-input-area">
            <input type="text" id="chat-input" placeholder="Yaz..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()" style="background:#00BFFF; color:white; border:none; margin-left:5px; border-radius:5px;">Gönder</button>
        </div>
    </div>

    <div id="profile-overlay">
        <div class="profile-card">
            <h2 style="color:#00BFFF; margin-top:0;">Yıldırımlar123</h2>
            <p>İsmini Belirle:</p>
            <input type="text" id="username-input" style="padding:10px; width:90%; border:2px solid #ddd; border-radius:5px;">
            <br><br>
            <button onclick="saveProfile()" style="padding:12px 25px; background:#00BFFF; color:white; border:none; border-radius:10px; font-weight:bold; width:100%;">Kaydol ve Başla</button>
        </div>
    </div>

    <script>
        /* SENİN ESKİ ÇİZİM KODLARIN (DOKUNULMADI) */
        const cvs = document.getElementById('artCanvas');
        const ctx = cvs.getContext('2d');
        let clr = '#000000', sc = 1, px = 0, py = 0, sz = 128;
        cvs.width = sz; cvs.height = sz;

        const colors = ['#000000', '#FFFFFF', '#808080', '#FF0000', '#FFA500', '#FFFF00', '#008000', '#0000FF', '#800080', '#FFC0CB', '#FFDBAC', '#00FFFF'];
        const palette = document.getElementById('ui-palette');

        colors.forEach((c, i) => {
            const div = document.createElement('div');
            div.className = 'color' + (i === 0 ? ' active' : '');
            div.style.backgroundColor = c;
            div.onclick = () => {
                document.querySelectorAll('.color').forEach(el => el.classList.remove('active'));
                div.classList.add('active');
                clr = c;
            };
            palette.appendChild(div);
        });

        window.m = (dx, dy) => { px += dx; py += dy; up(); };
        window.z = (ds) => { sc = Math.max(0.2, sc + ds); up(); };
        function up() { cvs.style.transform = `translate(${px}px, ${py}px) scale(${sc})`; }

        cvs.addEventListener('click', (e) => {
            const r = cvs.getBoundingClientRect();
            const x = Math.floor((e.clientX - r.left) / (r.width / sz));
            const y = Math.floor((e.clientY - r.top) / (r.height / sz));
            ctx.fillStyle = clr;
            ctx.fillRect(x, y, 1, 1);
        });

        /* CHAT VE PROFİL SİSTEMİ (ÇEREZ VE FIREBASE) */
        const firebaseConfig = {
            apiKey: "API_ANAHTARIN",
            databaseURL: "DB_URL_ADRESIN",
            projectId: "PROJE_IDN"
            // Diğer Firebase bilgilerini buraya ekle
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = "";
        function setCookie(n, v) {
            let d = new Date(); d.setTime(d.getTime()+(30*24*60*60*1000));
            document.cookie = n+"="+v+";expires="+d.toUTCString()+";path=/";
        }
        function getCookie(n) {
            let name = n + "=";
            let ca = document.cookie.split(';');
            for(let i=0; i<ca.length; i++) {
                let c = ca[i].trim();
                if (c.indexOf(name) == 0) return c.substring(name.length, c.length);
            }
            return "";
        }

        window.onload = () => {
            let u = getCookie("username");
            if(u) { currentUser = u; document.getElementById('profile-overlay').style.display = 'none'; }
            up();
        };

        function saveProfile() {
            let val = document.getElementById('username-input').value.trim();
            if(val.length >= 2) {
                setCookie("username", val);
                currentUser = val;
                document.getElementById('profile-overlay').style.display = 'none';
            }
        }

        let isChatOpen = false;
        function toggleChat() {
            isChatOpen = !isChatOpen;
            document.getElementById('chat-window').style.display = isChatOpen ? 'flex' : 'none';
            if(isChatOpen) document.getElementById('notif-dot').style.display = 'none';
        }

        function sendMsg() {
            let inp = document.getElementById('chat-input');
            if(!inp.value.trim()) return;
            db.ref('chat').push({ name: currentUser, msg: inp.value, time: Date.now() });
            inp.value = "";
        }

        db.ref('chat').limitToLast(15).on('child_added', (s) => {
            let d = s.val();
            let m = document.createElement('div');
            m.innerHTML = `<b>${d.name}:</b> ${d.msg}`;
            m.style.marginBottom = "5px";
            let box = document.getElementById('chat-messages');
            box.appendChild(m);
            box.scrollTop = box.scrollHeight;
            if(!isChatOpen && d.name !== currentUser) document.getElementById('notif-dot').style.display = 'block';
        });
    </script>
</body>
</html>
