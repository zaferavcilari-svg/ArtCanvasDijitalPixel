<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ArtCanvas - Dijital</title>
    <style>
        /* GENEL TASARIM */
        body { margin: 0; background: #0000FF; overflow: hidden; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #header-bar { position: fixed; top: 0; width: 100%; background: #00BFFF; color: white; padding: 10px; text-align: center; font-weight: bold; z-index: 3000; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        
        /* KANVAS ALANI */
        #canvas-wrap { position: relative; width: 320px; height: 320px; background: white; border: 4px solid #00BFFF; overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        canvas { width: 100%; height: 100%; image-rendering: pixelated; transform-origin: center; cursor: crosshair; }
        
        /* KONTROLLER */
        #ui-controls { position: fixed; bottom: 100px; right: 15px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; z-index: 2000; }
        .btn { width: 50px; height: 50px; background: white; border: 3px solid #00BFFF; border-radius: 10px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        
        /* RENK PALETİ */
        #ui-palette { position: fixed; bottom: 0; width: 100%; height: 95px; background: #f0f0f0; border-top: 5px solid #00BFFF; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 6px; padding: 5px; box-sizing: border-box; z-index: 1500; }
        .color { width: 35px; height: 35px; border-radius: 5px; border: 1px solid #ccc; cursor: pointer; }
        .color.active { border: 3px solid #00BFFF; transform: scale(1.1); box-shadow: 0 0 5px rgba(0,191,255,0.8); }

        /* CHAT VE KAYIT BUTONLARI */
        #chat-icon { position: fixed; bottom: 105px; left: 15px; width: 60px; height: 60px; background: #00BFFF; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 2000; border: 3px solid white; font-size: 28px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        #reg-btn { position: fixed; bottom: 175px; left: 15px; width: 65px; height: 35px; background: white; border: 2px solid #00BFFF; border-radius: 8px; cursor: pointer; z-index: 2000; font-size: 11px; font-weight: bold; color: #00BFFF; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        
        /* CHAT PENCERESİ */
        #chat-window { position: fixed; bottom: 220px; left: 15px; width: 280px; height: 350px; background: white; border-radius: 15px; display: none; flex-direction: column; z-index: 2000; border: 3px solid #00BFFF; box-shadow: 0 10px 25px rgba(0,0,0,0.4); }
        #chat-messages { flex: 1; overflow-y: auto; padding: 10px; font-size: 14px; background: #fafafa; }
        #chat-input-area { display: flex; padding: 10px; border-top: 1px solid #eee; background: white; border-radius: 0 0 15px 15px; }
        #chat-input { flex: 1; border: 1px solid #ddd; border-radius: 5px; padding: 8px; outline: none; font-size: 14px; }

        /* KAYIT PANELİ (OVERLAY) */
        #profile-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 5000; display: none; align-items: center; justify-content: center; }
        .profile-card { background: white; padding: 30px; border-radius: 20px; text-align: center; border: 5px solid #00BFFF; width: 260px; box-shadow: 0 0 30px rgba(0,191,255,0.4); }
    </style>
</head>
<body>

    <div id="header-bar">Dijital - ArtCanvas (Alpha)</div>

    <div id="canvas-wrap">
        <canvas id="artCanvas"></canvas>
    </div>

    <div id="ui-controls">
        <button class="btn" onclick="m(0,-40)">⬆️</button>
        <button class="btn" onclick="m(0,40)">⬇️</button>
        <button class="btn" onclick="m(-40,0)">⬅️</button>
        <button class="btn" onclick="m(40,0)">➡️</button>
        <button class="btn" onclick="z(0.3)">➕</button>
        <button class="btn" onclick="z(-0.3)">➖</button>
    </div>

    <div id="ui-palette"></div>

    <button id="reg-btn" onclick="openReg()">KAYDOL</button>
    <div id="chat-icon" onclick="toggleChat()">💬</div>
    
    <div id="chat-window">
        <div style="background:#00BFFF; color:white; padding:10px; text-align:center; font-weight:bold; font-size:13px;">UKZCM Hydra Chat Merkezi</div>
        <div id="chat-messages"></div>
        <div id="chat-input-area">
            <input type="text" id="chat-input" placeholder="Mesaj yaz..." onkeypress="if(event.key==='Enter')sendMsg()">
            <button onclick="sendMsg()" style="background:#00BFFF; color:white; border:none; border-radius:5px; margin-left:8px; cursor:pointer; padding:8px 12px; font-weight:bold;">></button>
        </div>
    </div>

    <div id="profile-overlay">
        <div class="profile-card">
            <h2 style="color:#00BFFF; margin-top:0;">Dijital Giriş</h2>
            <p style="font-size:14px; color:#444;">Kullanıcı adını belirle:</p>
            <input type="text" id="username-input" placeholder="Yıldırım..." style="width:90%; padding:12px; border:2px solid #eee; border-radius:8px; font-size:16px; outline:none;">
            <br><br>
            <button onclick="saveName()" style="width:100%; padding:12px; background:#00BFFF; color:white; border:none; border-radius:10px; font-weight:bold; font-size:16px; cursor:pointer;">SİSTEME GİR</button>
            <button onclick="closeReg()" style="margin-top:15px; background:none; border:none; color:gray; font-size:12px; cursor:pointer; text-decoration:underline;">Kapat</button>
            <p style="font-size:10px; color:#aaa; margin-top:20px;">© 2026 Dijital - Yıldırımlar123</p>
        </div>
    </div>

    <script>
        // --- TEMEL DEĞİŞKENLER ---
        const cvs = document.getElementById('artCanvas');
        const ctx = cvs.getContext('2d');
        let clr = '#000000', sc = 1, px = 0, py = 0, sz = 128;
        cvs.width = sz; cvs.height = sz;

        // --- RENK PALETİ OLUŞTURMA ---
        const colors = ['#000000', '#FFFFFF', '#808080', '#FF0000', '#FFA500', '#FFFF00', '#008000', '#0000FF', '#800080', '#FFC0CB', '#FFDBAC', '#00FFFF'];
        const palette = document.getElementById('ui-palette');

        colors.forEach((c, i) => {
            const div = document.createElement('div');
            div.className = 'color' + (i === 0 ? ' active' : '');
            div.style.backgroundColor = c;
            div.onclick = () => {
                document.querySelectorAll('.color').forEach(el => el.classList.remove('active'));
                div.classList.add('active');
                clr = c;
            };
            palette.appendChild(div);
        });

        // --- KANVAS HAREKET KONTROLLERİ ---
        window.m = (dx, dy) => { px += dx; py += dy; up(); };
        window.z = (ds) => { sc = Math.max(0.2, sc + ds); up(); };
        function up() { cvs.style.transform = `translate(${px}px, ${py}px) scale(${sc})`; }

        // --- İSİM VE ÇEREZ SİSTEMİ ---
        function getCookie(n) {
            let b = document.cookie.match('(^|;)\\s*' + n + '\\s*=\\s*([^;]+)');
            return b ? b.pop() : "";
        }

        let myName = getCookie("user_name") || "Kullanıcı" + Math.floor(Math.random() * 1000);

        function openReg() { document.getElementById('profile-overlay').style.display = 'flex'; }
        function closeReg() { document.getElementById('profile-overlay').style.display = 'none'; }
        function saveName() {
            let input = document.getElementById('username-input').value.trim();
            if (input.length >= 2) {
                document.cookie = "user_name=" + input + "; max-age=2592000; path=/";
                myName = input;
                closeReg();
                alert("Hoş geldin " + myName);
            }
        }

        // --- CHAT VE SENKRONİZASYON ---
        function toggleChat() {
            let w = document.getElementById('chat-window');
            w.style.display = (w.style.display === 'flex') ? 'none' : 'flex';
        }

        function sendMsg() {
            let inp = document.getElementById('chat-input');
            if(!inp.value.trim()) return;
            // Burası Termux veritabanına veri gönderecek
            console.log("Mesaj Hazır:", myName, inp.value);
            inp.value = "";
        }

        // --- VERİ ÇEKME (DATABASE.JSON) ---
        function syncFromTermux() {
            fetch('database.json?t=' + Date.now())
            .then(res => res.json())
            .then(data => {
                // Pixelleri Çiz
                data.pixels.forEach(p => {
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x, p.y, 1, 1);
                });
                // Chat Güncelle
                const box = document.getElementById('chat-messages');
                box.innerHTML = "";
                data.messages.forEach(m => {
                    box.innerHTML += `<div style="margin-bottom:6px; border-bottom:1px solid #f0f0f0; padding-bottom:2px;"><b>${m.user}:</b> ${m.text}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            }).catch(e => console.log("Veri merkezi (Termux) bekleniyor..."));
        }

        // Pixel Koyma Olayı
        cvs.addEventListener('click', (e) => {
            const r = cvs.getBoundingClientRect();
            const x = Math.floor((e.clientX - r.left) / (r.width / sz));
            const y = Math.floor((e.clientY - r.top) / (r.height / sz));
            
            // Yerel çizim (Hız için)
            ctx.fillStyle = clr;
            ctx.fillRect(x, y, 1, 1);
            
            // Termux'a bildirme logu
            console.log("Pixel:", x, y, clr);
        });

        // 5 saniyede bir otomatik güncelleme
        setInterval(syncFromTermux, 5000);
        window.onload = up;
    </script>
</body>
</html>
