<head>

    <title>ArtCanvas - Ana Katman</title>
    <style>
        /* CSS: Tam ekran ve boş katman ayarları */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden; /* Taşmaları engelle */
            background-color: #1a1a1a; /* En alt katman rengi */
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
