<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ArtCanvas - AC 0.42 Eksi Koordinat Sürümü</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #0000FF; --panel: #f0f0f0; --text: #000; }
        .dark-mode { --bg: #121212; --panel: #1e1e1e; --text: #fff; }
        
        body { margin: 0; background: var(--bg); overflow: hidden; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; user-select: none; -webkit-user-select: none; transition: background 0.3s; }
        #header-bar { position: fixed; top: 0; width: 100%; background: #00BFFF; color: white; padding: 10px; text-align: center; font-weight: bold; z-index: 3000; pointer-events: none; }
        
        #status-container { position: fixed; top: 50px; left: 10px; display: flex; flex-direction: column; gap: 5px; z-index: 4000; pointer-events: none; }
        .info-box { background: rgba(0,0,0,0.7); color: white; padding: 8px; border-radius: 5px; font-size: 12px; border: 1px solid #00BFFF; }
        #coords-status { border-color: #FFD700; color: #FFD700; font-weight: bold; font-size: 14px; }
        
        #viewport { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; z-index: 1; cursor: grab; }
        #viewport:active { cursor: grabbing; }

        #canvas-wrap { position: relative; width: 320px; height: 320px; background: white; border: 4px solid #00BFFF; overflow: hidden; pointer-events: auto; }
        canvas { width: 100%; height: 100%; image-rendering: pixelated; transform-origin: center; }
        
        #ui-palette { position: fixed; bottom: 0; width: 100%; height: 100px; background: var(--panel); border-top: 5px solid #00BFFF; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 6px; padding: 5px; box-sizing: border-box; z-index: 1500; }
        .color { width: 35px; height: 35px; border-radius: 5px; border: 1px solid #ccc; cursor: pointer; }
        .color.active { border: 3px solid #00BFFF; transform: scale(1.1); }
        
        .ui-btn { position: fixed; width: 55px; height: 55px; background: #00BFFF; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 2000; border: 3px solid white; font-size: 24px; color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        #chat-icon { bottom: 120px; left: 15px; }
        #reg-btn { bottom: 190px; left: 15px; font-size: 12px; font-weight: bold; border-radius: 12px; width: 60px; height: 45px; background: white; color: #00BFFF; border: 2px solid #00BFFF; }
        #theme-btn { bottom: 250px; left: 15px; }

        #chat-window { position: fixed; bottom: 230px; left: 15px; width: 280px; height: 350px; background: white; border-radius: 15px; display: none; flex-direction: column; z-index: 2000; border: 3px solid #00BFFF; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 10px; font-size: 14px; background: #fafafa; color: #000; }
        #chat-input-area { display: flex; padding: 10px; border-top: 1px solid #eee; }
        #chat-input { flex: 1; border: 1px solid #ddd; border-radius: 5px; padding: 8px; outline: none; }
        
        #profile-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 5000; display: none; align-items: center; justify-content: center; }
        .profile-card { background: white; padding: 30px; border-radius: 20px; text-align: center; border: 5px solid #00BFFF; width: 260px; color: #000; }
        .p-input { width: 85%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; }
    </style>
</head>
<body>

    <div id="status-container">
        <div id="px-status" class="info-box">Pixel: <span id="px-count">150</span>/150<br>Yükleme: <span id="px-timer">60</span>s</div>
        <div id="coords-status" class="info-box">(0_0-)</div>
    </div>

    <audio id="bgMusic" loop><source src="rplaceoldmusic.mp3" type="audio/mpeg"></audio>
    <div id="header-bar">UKZCM Hydra - ArtCanvas (AC 0.42)</div>

    <div id="viewport">
        <div id="canvas-wrap">
            <canvas id="artCanvas"></canvas>
        </div>
    </div>

    <button id="reg-btn" class="ui-btn" onclick="openReg()">PROFİL</button>
    <div id="chat-icon" class="ui-btn" onclick="toggleChat()">💬</div>
    <div id="theme-btn" class="ui-btn" onclick="toggleTheme()">🌓</div>
    
    <div id="chat-window">
        <div id="chat-messages"></div>
        <div id="chat-input-area">
            <input type="text" id="chat-input" placeholder="Yaz..." onkeypress="if(event.key==='Enter')sendMsg()">
            <button onclick="sendMsg()" style="background:#00BFFF; color:white; border:none; padding:8px; border-radius:5px;">></button>
        </div>
    </div>

    <div id="profile-overlay"><div class="profile-card">
        <h2>👑 UKZCM Profil</h2>
        <input type="text" id="username-input" class="p-input" placeholder="Kullanıcı Adı">
        <input type="text" id="tag-input" class="p-input" placeholder="Klan Etiketi (Örn: UKZCM)">
        <button onclick="saveName()" style="width:100%; padding:12px; background:#00BFFF; color:white; border:none; border-radius:8px; font-weight:bold; margin-bottom:5px;">Kaydet</button>
        <button onclick="closeReg()" style="background:none; border:none; color:#666; margin-top:5px;">Kapat</button>
    </div></div>

    <script>
        const firebaseConfig = { databaseURL: "https://ukzcm-artcanvas-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const cvs = document.getElementById('artCanvas'), ctx = cvs.getContext('2d');
        const wrap = document.getElementById('canvas-wrap'), view = document.getElementById('viewport');
        const coordsBox = document.getElementById('coords-status');
        let clr = '#000000', sc = 1, px = 0, py = 0, sz = 128;
        cvs.width = sz; cvs.height = sz;

        let isDragging = false, startX, startY, isClick = true, initialPinchDist = 0;

        function updateTransform() { wrap.style.transform = `translate(${px}px, ${py}px) scale(${sc})`; }

        view.addEventListener('wheel', (e) => { e.preventDefault(); let zf = e.deltaY < 0 ? 0.1 : -0.1; sc = Math.max(0.2, Math.min(10, sc + zf)); updateTransform(); }, { passive: false });

        const startPan = (e) => {
            if(e.target.closest('#ui-palette') || e.target.closest('#chat-window') || e.target.closest('.ui-btn')) return;
            if (e.touches && e.touches.length === 2) { isDragging = false; initialPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); return; }
            isDragging = true; isClick = true;
            const cx = e.touches ? e.touches[0].clientX : e.clientX; const cy = e.touches ? e.touches[0].clientY : e.clientY;
            startX = cx - px; startY = cy - py;
        };

        const movePan = (e) => {
            if (e.touches && e.touches.length === 2) { e.preventDefault(); const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); let f = dist / initialPinchDist; sc = f > 1 ? Math.min(10, sc + 0.05) : Math.max(0.2, sc - 0.05); initialPinchDist = dist; updateTransform(); return; }
            if (!isDragging) return; isClick = false;
            const cx = e.touches ? e.touches[0].clientX : e.clientX; const cy = e.touches ? e.touches[0].clientY : e.clientY;
            px = cx - startX; py = cy - startY; updateTransform();
        };

        view.addEventListener('mousedown', startPan); window.addEventListener('mousemove', movePan); window.addEventListener('mouseup', () => isDragging = false);
        view.addEventListener('touchstart', startPan, { passive: true }); window.addEventListener('touchmove', movePan, { passive: false }); window.addEventListener('touchend', () => isDragging = false);

        // SINIRSIZ VE EKSİLİ MAP KOORDİNAT HESAPLAMASI
        function getCanvasCoords(clientX, clientY) {
            const rect = cvs.getBoundingClientRect();
            // Kanvasın sol üst köşesini değil, merkezini veya tıklanan piksel oranını tam matematiksel hesaplıyoruz
            const x = Math.floor((clientX - rect.left) / (rect.width / sz));
            const y = Math.floor((clientY - rect.top) / (rect.height / sz));
            
            // Eğer harita sınırının dışına taşılırsa eksi değerleri de tam görebilmek için sınır koymuyoruz
            coordsBox.innerText = `(${y}_${x}-)`; 
        }

        cvs.addEventListener('mousemove', (e) => getCanvasCoords(e.clientX, e.clientY));
        cvs.addEventListener('touchmove', (e) => { if(e.touches.length === 1) getCanvasCoords(e.touches[0].clientX, e.touches[0].clientY); });

        // PİXEL KOYMA
        cvs.addEventListener('click', (e) => {
            if (!isClick) return; if (myPixels <= 0) return alert("Pixel hakkın bitti lider!");
            const rect = cvs.getBoundingClientRect();
            const x = Math.floor((e.clientX - rect.left) / (rect.width / sz)), y = Math.floor((e.clientY - rect.top) / (rect.height / sz));
            if (x >= 0 && x < sz && y >= 0 && y < sz) {
                db.ref('pixels').push({ x, y, color: clr });
                myPixels--;
                updatePixelUI();
            }
        });

        let myPixels = parseInt(localStorage.getItem('my_pixels')) || 150, timeLeft = 60;
        function updatePixelUI() { document.getElementById('px-count').innerText = myPixels; document.getElementById('px-timer').innerText = timeLeft; localStorage.setItem('my_pixels', myPixels); }
        setInterval(() => { timeLeft--; if (timeLeft <= 0) { myPixels = Math.min(150, myPixels + 10); timeLeft = 60; } updatePixelUI(); }, 1000);

        const colors = ['#000000', '#FFFFFF', '#808080', '#FF0000', '#FFA500', '#FFFF00', '#008000', '#0000FF', '#800080', '#FFC0CB', '#FFDBAC', '#00FFFF'];
        const palette = document.getElementById('ui-palette');
        colors.forEach((c, i) => {
            const div = document.createElement('div'); div.className = 'color' + (i === 0 ? ' active' : ''); div.style.backgroundColor = c;
            div.onclick = () => { document.querySelectorAll('.color').forEach(el => el.classList.remove('active')); div.classList.add('active'); clr = c; };
            palette.appendChild(div);
        });

        db.ref('pixels').on('child_added', (snap) => {
            const p = snap.val(); ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, 1, 1);
        });

        function getCookie(n) { let b = document.cookie.match('(^|;)\\s*' + n + '\\s*=\\s*([^;]+)'); return b ? b.pop() : ""; }
        let myName = getCookie("user_name") || "Kullanıcı" + Math.floor(Math.random()*100);
        let myTag = getCookie("user_tag") || "UKZCM";

        function openReg() { document.getElementById('username-input').value = myName; document.getElementById('tag-input').value = myTag; document.getElementById('profile-overlay').style.display = 'flex'; }
        function closeReg() { document.getElementById('profile-overlay').style.display = 'none'; }
        function saveName() { 
            let i = document.getElementById('username-input').value, t = document.getElementById('tag-input').value; 
            if(i) { document.cookie = "user_name=" + i + "; max-age=2592000; path=/"; myName = i; }
            if(t) { document.cookie = "user_tag=" + t + "; max-age=2592000; path=/"; myTag = t; }
            closeReg(); 
        }
        
        function toggleChat() { let w = document.getElementById('chat-window'); w.style.display = (w.style.display === 'flex') ? 'none' : 'flex'; }
        function sendMsg() { let i = document.getElementById('chat-input'); if(i.value) { db.ref('messages').push({ user: `[${myTag}] ${myName}`, text: i.value }); i.value = ""; }}
        db.ref('messages').limitToLast(15).on('child_added', (s) => { document.getElementById('chat-messages').innerHTML += `<div><b>${s.val().user}:</b> ${s.val().text}</div>`; document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight; });

        function toggleTheme() { document.body.classList.toggle('dark-mode'); }

        const music = document.getElementById('bgMusic');
        window.addEventListener('pointerdown', () => { music.play().catch(() => {}); }, { once: true });
        window.onload = () => { updateTransform(); updatePixelUI(); };
    </script>
</body>
</html>
