<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ArtCanvas - AC 0.37 Fix</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { margin: 0; background: #0000FF; overflow: hidden; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #header-bar { position: fixed; top: 0; width: 100%; background: #00BFFF; color: white; padding: 10px; text-align: center; font-weight: bold; z-index: 3000; }
        
        #status-box { position: fixed; top: 50px; left: 10px; background: rgba(0,0,0,0.8); color: white; padding: 10px; border-radius: 8px; font-size: 11px; z-index: 4000; border: 2px solid #00BFFF; }
        
        #canvas-wrap { position: relative; width: 320px; height: 320px; background: white; border: 4px solid #00BFFF; overflow: hidden; z-index: 5; }
        canvas { width: 100%; height: 100%; image-rendering: pixelated; transform-origin: center; }
        
        #ui-controls { position: fixed; bottom: 110px; right: 15px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; z-index: 2000; }
        .btn { width: 50px; height: 50px; background: white; border: 3px solid #00BFFF; border-radius: 10px; font-size: 20px; cursor: pointer; }
        
        #ui-palette { position: fixed; bottom: 0; width: 100%; height: 100px; background: #f0f0f0; border-top: 5px solid #00BFFF; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 6px; padding: 5px; box-sizing: border-box; z-index: 1500; }
        .color { width: 35px; height: 35px; border-radius: 5px; border: 1px solid #ccc; }

        /* BUTONLARIN GERİ GELİŞİ */
        #chat-icon { position: fixed; bottom: 120px; left: 15px; width: 60px; height: 60px; background: #00BFFF; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 2000; border: 3px solid white; font-size: 28px; }
        #reg-btn { position: fixed; bottom: 190px; left: 15px; width: 70px; height: 40px; background: white; border: 3px solid #00BFFF; border-radius: 10px; z-index: 2000; font-weight: bold; color: #00BFFF; }
        
        #chat-window { position: fixed; bottom: 240px; left: 15px; width: 280px; height: 350px; background: white; border-radius: 15px; display: none; flex-direction: column; z-index: 2000; border: 3px solid #00BFFF; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 10px; font-size: 13px; }
        
        #profile-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9000; display: none; align-items: center; justify-content: center; color: white; }
    </style>
</head>
<body>

    <div id="status-box">Pixel: <span id="px-count">150</span>/150<br>Rol: <span id="role-text">guest</span></div>

    <div id="header-bar">Dijital - ArtCanvas (AC 0.37)</div>
    <div id="canvas-wrap"><canvas id="artCanvas"></canvas></div>

    <div id="ui-controls">
        <button class="btn" onclick="m(0,-40)">⬆️</button><button class="btn" onclick="m(0,40)">⬇️</button><button class="btn" onclick="m(-40,0)">⬅️</button>
        <button class="btn" onclick="m(40,0)">➡️</button><button class="btn" onclick="z(0.3)">➕</button><button class="btn" onclick="z(-0.3)">➖</button>
    </div>

    <div id="ui-palette"></div>
    <button id="reg-btn" onclick="openReg()">KAYDOL</button>
    <div id="chat-icon" onclick="toggleChat()">💬</div>
    
    <div id="chat-window">
        <div id="chat-messages"></div>
        <div style="padding:10px; display:flex;"><input type="text" id="chat-input" style="flex:1;"><button onclick="handleInput()">></button></div>
    </div>

    <div id="profile-overlay">
        <div style="background:white; color:black; padding:30px; border-radius:20px; text-align:center;">
            <h3>Yıldırım Kayıt Sistemi</h3>
            <input type="text" id="username-input" placeholder="İsim Giriniz...">
            <button onclick="saveName()">KAYDET</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://ukzcm-artcanvas-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Çerezlerden isim ve rol al
        let myName = localStorage.getItem('user_name') || "Misafir";
        let myRole = localStorage.getItem('user_role') || "guest";
        document.getElementById('role-text').innerText = myRole;

        function openReg() { document.getElementById('profile-overlay').style.display = 'flex'; }
        function saveName() {
            let n = document.getElementById('username-input').value;
            if(n) {
                localStorage.setItem('user_name', n);
                // Firebase'e "yetki" sütununu chate ilk mesaj attığında manuel ekleyebiliriz
                db.ref('users/' + n).set({ name: n, yetki: "guest" });
                location.reload();
            }
        }

        function handleInput() {
            let inp = document.getElementById('chat-input');
            if(inp.value.startsWith('/ban ')) {
                if(myRole === "yetkili") {
                    db.ref('commands').push({ type: 'ban', target: inp.value.split('@')[1] });
                } else { alert("Yetkiniz yok!"); }
            } else {
                db.ref('messages').push({ user: myName, text: inp.value, yetki: myRole });
            }
            inp.value = "";
        }

        // --- KANVAS VE PİXEL SİSTEMİ BURAYA GELECEK ---
        // (Önceki stabil kanvas kodlarını buraya ekleyebilirsin)
        
        function toggleChat() { let w = document.getElementById('chat-window'); w.style.display = (w.style.display === 'flex') ? 'none' : 'flex'; }
    </script>
</body>
</html>
