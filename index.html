<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ArtCanvas - AC 0.37 Alpha</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { margin: 0; background: #0000FF; overflow: hidden; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #header-bar { position: fixed; top: 0; width: 100%; background: #00BFFF; color: white; padding: 10px; text-align: center; font-weight: bold; z-index: 3000; }
        
        /* PİXEL VE SÜRE KUTUCUĞU (SOL ÜST) */
        #status-box { position: fixed; top: 50px; left: 10px; background: rgba(0,0,0,0.7); color: white; padding: 8px; border-radius: 5px; font-size: 12px; z-index: 4000; border: 1px solid #00BFFF; }
        
        #canvas-wrap { position: relative; width: 320px; height: 320px; background: white; border: 4px solid #00BFFF; overflow: hidden; z-index: 5; }
        canvas { width: 100%; height: 100%; image-rendering: pixelated; transform-origin: center; }
        
        #ui-controls { position: fixed; bottom: 110px; right: 15px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; z-index: 2000; }
        .btn { width: 50px; height: 50px; background: white; border: 3px solid #00BFFF; border-radius: 10px; font-size: 20px; cursor: pointer; }
        
        #ui-palette { position: fixed; bottom: 0; width: 100%; height: 100px; background: #f0f0f0; border-top: 5px solid #00BFFF; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 6px; padding: 5px; box-sizing: border-box; z-index: 1500; }
        .color { width: 35px; height: 35px; border-radius: 5px; border: 1px solid #ccc; cursor: pointer; }
        .color.active { border: 3px solid #00BFFF; transform: scale(1.1); }

        #chat-icon { position: fixed; bottom: 120px; left: 15px; width: 60px; height: 60px; background: #00BFFF; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 2000; border: 3px solid white; font-size: 28px; }
        #chat-window { position: fixed; bottom: 230px; left: 15px; width: 280px; height: 350px; background: white; border-radius: 15px; display: none; flex-direction: column; z-index: 2000; border: 3px solid #00BFFF; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 10px; font-size: 13px; }
        #chat-input-area { display: flex; padding: 10px; border-top: 1px solid #eee; }
        #chat-input { flex: 1; border: 1px solid #ddd; border-radius: 5px; padding: 8px; outline: none; }

        #ban-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; color: red; z-index: 9999; display: none; align-items: center; justify-content: center; flex-direction: column; text-align: center; font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="ban-overlay"><h1>BANLANDINIZ!</h1><p>UKZCM Hydra kurallarını ihlal ettiniz.</p></div>
    
    <div id="status-box">
        Pixel: <span id="px-count">150</span>/150<br>
        Yeni Enerji: <span id="px-timer">60</span>s
    </div>

    <div id="header-bar">Dijital - ArtCanvas (AC 0.37 Alpha)</div>
    <div id="canvas-wrap"><canvas id="artCanvas"></canvas></div>

    <div id="ui-controls">
        <button class="btn" onclick="m(0,-40)">⬆️</button>
        <button class="btn" onclick="m(0,40)">⬇️</button>
        <button class="btn" onclick="m(-40,0)">⬅️</button>
        <button class="btn" onclick="m(40,0)">➡️</button>
        <button class="btn" onclick="z(0.3)">➕</button>
        <button class="btn" onclick="z(-0.3)">➖</button>
    </div>

    <div id="ui-palette"></div>
    <div id="chat-icon" onclick="toggleChat()">💬</div>
    
    <div id="chat-window">
        <div id="chat-messages"></div>
        <div id="chat-input-area">
            <input type="text" id="chat-input" placeholder="Mesaj veya Komut..." onkeypress="if(event.key==='Enter')handleInput()">
        </div>
    </div>

    <script>
        // --- AYARLAR VE DEĞİŞKENLER ---
        const firebaseConfig = { databaseURL: "https://ukzcm-artcanvas-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const cvs = document.getElementById('artCanvas');
        const ctx = cvs.getContext('2d');
        let clr = '#000000', sc = 1, px = 0, py = 0, sz = 128;
        cvs.width = sz; cvs.height = sz;

        let myPixels = parseInt(localStorage.getItem('pixel_count')) || 150;
        let myRole = "guest"; // Firebase'den güncellenecek

        // --- BAN KONTROLÜ ---
        if(localStorage.getItem('is_banned') === 'true') {
            document.getElementById('ban-overlay').style.display = 'flex';
        }

        // --- PİXEL SİSTEMİ (REJENERASYON) ---
        setInterval(() => {
            if(myPixels < 150) {
                myPixels = Math.min(150, myPixels + 10);
                updateUI();
            }
        }, 60000); // Her 1 dakikada 10 pixel

        function updateUI() {
            document.getElementById('px-count').innerText = myPixels;
            localStorage.setItem('pixel_count', myPixels);
        }

        // --- PALET ---
        const colors = ['#000000', '#FFFFFF', '#808080', '#FF0000', '#FFA500', '#FFFF00', '#008000', '#0000FF', '#800080', '#FFC0CB', '#FFDBAC', '#00FFFF'];
        const palette = document.getElementById('ui-palette');
        colors.forEach(c => {
            const div = document.createElement('div');
            div.className = 'color';
            div.style.backgroundColor = c;
            div.onclick = () => { clr = c; document.querySelectorAll('.color').forEach(e => e.classList.remove('active')); div.classList.add('active'); };
            palette.appendChild(div);
        });

        // --- HAREKET VE ÇİZİM ---
        window.m = (dx, dy) => { px += dx; py += dy; up(); };
        window.z = (ds) => { sc = Math.max(0.2, sc + ds); up(); };
        function up() { cvs.style.transform = `translate(${px}px, ${py}px) scale(${sc})`; }

        cvs.addEventListener('click', (e) => {
            if(myPixels <= 0) return alert("Pixel hakkınız bitti! Bekleyin.");
            const r = cvs.getBoundingClientRect();
            const x = Math.floor((e.clientX - r.left) / (r.width / sz));
            const y = Math.floor((e.clientY - r.top) / (r.height / sz));
            
            db.ref('pixels').push({ x, y, color: clr });
            myPixels--;
            updateUI();
        });

        db.ref('pixels').on('child_added', s => {
            const p = s.val();
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y, 1, 1);
        });

        // --- CHAT VE KOMUTLAR (BAN/UNBAN) ---
        function handleInput() {
            const inp = document.getElementById('chat-input');
            const val = inp.value.trim();
            if(!val) return;

            // Moderasyon Komutları
            if(val.startsWith('/ban ') || val.startsWith('/unban ')) {
                // Burada senin veritabanındaki rolünü kontrol etmen gerek
                // Manuel test için yetkili olduğunu varsayalım:
                if(myRole === "yetkili") {
                    const target = val.split('@')[1];
                    db.ref('commands').push({ type: val.startsWith('/ban') ? 'ban' : 'unban', target: target });
                    alert(target + " için işlem yapıldı.");
                } else {
                    alert("Yetkiniz yok!");
                }
            } else {
                db.ref('messages').push({ user: "Kullanıcı", text: val });
            }
            inp.value = "";
        }

        // Ban Dinleyici (Kendi adın chate yazıldığında tetiklenir)
        db.ref('commands').on('child_added', s => {
            const cmd = s.val();
            // Basit bir örnek: Eğer hedef isim çerezlerdeki isimle eşleşirse
            if(cmd.target === "SeninIsmin" && cmd.type === 'ban') {
                localStorage.setItem('is_banned', 'true');
                location.reload();
            }
            if(cmd.target === "SeninIsmin" && cmd.type === 'unban') {
                localStorage.removeItem('is_banned');
                location.reload();
            }
        });

        db.ref('messages').limitToLast(10).on('child_added', s => {
            document.getElementById('chat-messages').innerHTML += `<div><b>${s.val().user}:</b> ${s.val().text}</div>`;
        });

        function toggleChat() { let w = document.getElementById('chat-window'); w.style.display = (w.style.display === 'flex') ? 'none' : 'flex'; }
        window.onload = up;
    </script>
</body>
</html>
